<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groov — Get in the Groove</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(160deg, #F5F3FF 0%, #EDE9FE 40%, #DDD6FE 100%);
            color: #3B0764;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Soft ambient blobs */
        body::before {
            content: '';
            position: fixed;
            top: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(147,51,234,0.12) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -15%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(196,181,253,0.25) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* Logo / Brand */
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-logo {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: #6B21A8;
            margin-bottom: 4px;
        }
        .brand-logo span {
            display: inline-block;
            background: linear-gradient(135deg, #7C3AED, #9333EA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand-tagline {
            color: #7C3AED;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .brand-subtitle {
            color: #6B21A8;
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0.7;
        }

        /* Robot mascot decoration */
        .mascot {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 8px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-6px) rotate(-3deg); }
            75% { transform: translateY(-3px) rotate(3deg); }
        }

        /* Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid #DDD6FE;
            border-radius: 28px;
            padding: 36px 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(107, 33, 168, 0.08), 0 4px 12px rgba(107, 33, 168, 0.04);
        }

        /* Tab Toggle */
        .tab-toggle {
            display: flex;
            gap: 4px;
            background: #F5F3FF;
            border-radius: 16px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 14px;
            background: transparent;
            color: #7C3AED;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #7C3AED, #9333EA);
            color: #fff;
            box-shadow: 0 4px 14px rgba(124,58,237,0.3);
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6B21A8;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #DDD6FE;
            border-radius: 14px;
            background: #FDFCFF;
            color: #3B0764;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input:focus {
            border-color: #9333EA;
            box-shadow: 0 0 0 4px rgba(147,51,234,0.12);
        }
        .form-group input::placeholder {
            color: #C4B5FD;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7C3AED, #9333EA);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124,58,237,0.35);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error / Success Messages */
        .msg {
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
        }
        .msg.error {
            display: block;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #dc2626;
        }
        .msg.success {
            display: block;
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            color: #16a34a;
        }

        /* Hide forms by default */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #9333EA;
            font-size: 0.75rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Brand -->
        <div class="brand">
            <span class="mascot">🤖</span>
            <div class="brand-logo"><span>groov</span></div>
            <div class="brand-tagline">Get in the Groove</div>
            <p class="brand-subtitle">Your AI-powered virtual study room</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tab Toggle -->
            <div class="tab-toggle">
                <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Error / Success Message -->
            <div class="msg" id="authMsg"></div>

            <!-- Login Form -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" placeholder="Your display name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="At least 6 characters" minlength="6" required>
                    </div>
                    <button type="submit" class="submit-btn" id="regBtn">Create Account</button>
                </form>
            </div>
        </div>

        <div class="auth-footer">Powered by Ollama · 100% Local AI · Your data stays yours 🔒</div>
    </div>

    <script src="/static/auth.js"></script>
</body>
</html>
