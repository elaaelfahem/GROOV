<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Group — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #050510;
            color: #eeeef5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            width: 800px; height: 800px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(91,141,239,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* Logo / Brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }
        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #5b8def, #7c5bf5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand p {
            color: #7b7b95;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* Card */
        .auth-card {
            background: rgba(18, 18, 32, 0.65);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 36px 28px;
            backdrop-filter: blur(24px);
        }

        /* Tab Toggle */
        .tab-toggle {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #7b7b95;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: rgba(91,141,239,0.15);
            color: #5b8def;
            box-shadow: 0 2px 8px rgba(91,141,239,0.15);
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7b7b95;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #eeeef5;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input:focus {
            border-color: #5b8def;
            box-shadow: 0 0 0 3px rgba(91,141,239,0.15);
        }
        .form-group input::placeholder {
            color: #4a4a60;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #5b8def, #7c5bf5);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(91,141,239,0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error / Success Messages */
        .msg {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: none;
        }
        .msg.error {
            display: block;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .msg.success {
            display: block;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.25);
            color: #86efac;
        }

        /* Hide forms by default */
        .form-panel { display: none; }
        .form-panel.active { display: block; }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #4a4a60;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Brand -->
        <div class="brand">
            <span class="brand-icon">🧠</span>
            <h1>AI Study Group</h1>
            <p>Your virtual study room is waiting</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Tab Toggle -->
            <div class="tab-toggle">
                <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Create Account</button>
            </div>

            <!-- Error / Success Message -->
            <div class="msg" id="authMsg"></div>

            <!-- Login Form -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" placeholder="Your display name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="At least 6 characters" minlength="6" required>
                    </div>
                    <button type="submit" class="submit-btn" id="regBtn">Create Account</button>
                </form>
            </div>
        </div>

        <div class="auth-footer">Powered by Ollama · Local AI · Your data stays yours</div>
    </div>

    <script src="/static/auth.js"></script>
</body>
</html>
